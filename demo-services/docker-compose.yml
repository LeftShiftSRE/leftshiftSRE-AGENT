version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: relic-gateway
    ports:
      - "8000:8000"
    environment:
      - ORDER_SERVICE_URL=http://order_service:8001
    depends_on:
      - order_service
    networks:
      - relic-net

  order_service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: relic-order-service
    ports:
      - "8001:8001"
    environment:
      - PAYMENT_SERVICE_URL=http://payment_service:8002
      - INVENTORY_SERVICE_URL=http://inventory_service:8003
    depends_on:
      - payment_service
      - inventory_service
    networks:
      - relic-net

  payment_service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
    container_name: relic-payment-service
    ports:
      - "8002:8002"
    networks:
      - relic-net

  inventory_service:
    build:
      context: ./inventory_service
      dockerfile: Dockerfile
    container_name: relic-inventory-service
    ports:
      - "8003:8003"
    networks:
      - relic-net

networks:
  relic-net:
    driver: bridge